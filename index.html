<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css">
    <!-- <link rel="stylesheet" href="styles.css"> -->
    <title>My first page</title>
</head>
<body>
    <div class="container-fluid" style="background-color: #FFFFB5;">
        <h1 id="time"></h1>
        <h2 id="date"></h2>
    </div>
    <script type="text/javascript">
        function getDateTime (argument) {
            var date = new Date();
            var print1 = date.toLocaleString('ru-RU', { timeStyle: 'medium', hour12: true });
            var print2 = date.toLocaleString('ru-RU', { dateStyle: 'full' });
            document.getElementById("time").innerHTML = print1;
            document.getElementById("date").innerHTML = print2;
        }
        var time_div = document.getElementById("time");
        var date_div = document.getElementById("date");
        getDateTime();
        setInterval(() => { getDateTime(); }, 1000); // refresh time every minute
    </script>
</body>
</html>
