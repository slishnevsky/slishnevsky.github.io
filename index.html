<!DOCTYPE html>
<html>

<head>
  <title>Homepage</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/x-icon" href="assets/favicon.png" />
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
  <script src="js/index.js"></script>
  <script src="js/weather.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/bookmarks.js"></script>
  <script src="js/news.js"></script>
</head>

<body>
  <div id="content" style="display:none">
    <nav class="navbar navbar-inverse navbar-fixed-top">
      <div class="container">
        <div class="navbar-header">
          <div id="datetime" class="navbar-brand"></div>
        </div>
        <div class="collapse navbar-collapse" id="navbarNav">
          <form class="navbar-form navbar-right" onsubmit="return false">
            <div class="form-group">
              <input type="text" id="search" name="search" class="form-control" onkeyup="if (event.key == 'Enter')
            searchGoogle(this.form.search.value);" placeholder="Search" autofocus>
            </div>
            <button type="button" class="btn btn-success" onclick="searchGoogle(this.form.search.value)">Search</button>
            <div id="suggestions" class="panel panel-default">
            </div>
          </form>
        </div>
      </div>
    </nav>
    <div class="container">
      <div class="row">
        <div class="col-md-4">
          <div id="weather" class="panel panel-default">
            <div class="panel-heading">
              <a href="https://weather.gc.ca/en/location/index.html?coords=43.655,-79.383" target="_blank">Погода</a>
            </div>
          </div>
          <div id="calendar" class="panel panel-default">
            <div class="panel-heading">
              <a href="https://calendar.google.com/calendar/u/0/r" target="_blank">Календарь</a>
            </div>
          </div>
          <div id="events" class="panel panel-default">
            <div class="panel-heading">
              <a href="https://calendar.google.com/calendar/u/0/r" target="_blank">Запланированные события</a>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div id="bookmarks1" class="panel panel-default">
            <div class="panel-heading">
              <a href="https://www.circulars.ca/" target="_blank">Флаерсы</a>
            </div>
          </div>
          <div id="bookmarks2" class="panel panel-default">
            <div class="panel-heading">
              <a href="https://flyers.smartcanucks.ca/" target="_blank">Магазины</a>
            </div>
          </div>
          <div id="bookmarks3" class="panel panel-default">
            <div class="panel-heading">Сервисы</div>
          </div>
        </div>
        <div class="col-md-4">
          <div id="news1" class="panel panel-default">
            <div class="panel-heading">
              <a href="https://news.knopka.ca/" target="_blank">Канадские новости</a>
            </div>
          </div>
          <div id="news2" class="panel panel-default">
            <div class="panel-heading">
              <a href="https://www.youtube.com/@TwoCatsVideoProduction/videos" target="_blank">Видео новости</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script type="text/javascript">
    // Get references to all the content sections
    const datetime1 = document.getElementById('datetime');
    const search1 = document.getElementById('search');
    const weather1 = document.getElementById('weather');
    const calendar1 = document.getElementById('calendar');
    const events1 = document.getElementById('events');
    const bookmarks1 = document.getElementById('bookmarks1');
    const bookmarks2 = document.getElementById('bookmarks2');
    const bookmarks3 = document.getElementById('bookmarks3');
    const news1 = document.getElementById('news1');
    const news2 = document.getElementById('news2');
    const suggestions1 = document.getElementById('suggestions');

    // Google API credentials
    const CLIENT_ID = "84522859201-u0bemvmn44b552j4j2eq7j5smdn32et8.apps.googleusercontent.com";
    const API_KEY = "AIzaSyBDfHg7DWRW8ruNA7E90swUJpEJ_IiLqNo";

    // Discovery doc URL for APIs used by the quickstart
    // For a full list of discovery doc URLs, see https://developers.google.com/discovery/v1/apis.
    const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest';

    // Authorization scopes required by the API; multiple scopes can be included, separated by spaces
    // If using the Google Calendar API, the scope is 'https://www.googleapis.com/auth/calendar.readonly'
    const SCOPES = 'https://www.googleapis.com/auth/calendar.readonly';

    let tokenClient; // Google Identity Services token client
    let gapiInited = false; // Flag to indicate if the Google API client is loaded
    let gisInited = false; // Flag to indicate if the Google Identity Services client is loaded

    // Loads the token from localStorage if available and attempts to load events
    // If no token is found, it will attempt silent authorization using the token client
    // This function is called after both the Google API client and the Google Identity Services client are initialized.
    // If a token is found in localStorage, it sets the token for the Google API client and creates all content.
    // If no token is found, it attempts to request an access token silently. If the user has previously authorized the application, it will succeed and create all content. If not, it will display a message prompting the user to refresh the page and authorize.
    function loadToken() {
      if (gapiInited && gisInited) {
        const token = localStorage.getItem('google_access_token');
        if (token) {
          gapi.client.setToken({ access_token: token });
          createAllContent();
        } else {
          // If no token, attempt silent authorization
          if (tokenClient) {
            tokenClient.callback = async (resp) => {
              if (resp.error !== undefined) {
                document.getElementById('content').innerText = 'Authorization required. Please refresh the page and authorize.';
                return;
              }
              const token = gapi.client.getToken();
              localStorage.setItem('google_access_token', token.access_token);
              await createAllContent();
            };
            tokenClient.requestAccessToken({ prompt: '' });
          }
        }
      }
    }

    // Callback after api.js is loaded
    // Loads the API client and auth2 library. Will be called when the APIs are loaded and ready to be used.
    // This function is called when the Google API client library is loaded. It initializes the API client with the API key and discovery document, and sets the gapiInited flag to true. After initialization, it calls tryToLoadToken to attempt to load the token and create content if both APIs are initialized.
    function gapiLoaded() {
      gapi.load('client', initializeGapiClient);
    }

    // Callback after the API client is loaded. Loads the discovery doc to initialize the API.
    // After loading, the API is ready to be used.
    // This function initializes the Google API client with the API key and discovery document. It sets the gapiInited flag to true and calls tryToLoadToken to attempt to load the token and create content if both APIs are initialized.
    async function initializeGapiClient() {
      await gapi.client.init({
        apiKey: API_KEY,
        discoveryDocs: [DISCOVERY_DOC],
      });
      gapiInited = true;
      loadToken();
    }

    // Callback after Google Identity Services are loaded.
    // Initializes the token client. Will be called when the Google Identity Services library is loaded.
    // This function initializes the Google Identity Services token client with the client ID, scope, and a callback function that will be defined later. It sets the gisInited flag to true and calls tryToLoadToken to attempt to load the token and create content if both APIs are initialized.
    function gisLoaded() {
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: '', // defined later
      });
      gisInited = true;
      loadToken();
    }

    // Function to create all content on the page after successful authentication
    function createAllContent() {
      getDateTime(datetime1);
      getWeather(weather1);
      getCalendar(calendar1, events1);
      getBookmarks(bookmarks1, 'Флаерсы');
      getBookmarks(bookmarks2, 'Магазины');
      getBookmarks(bookmarks3, 'Сервисы');
      getNews(news1, 'https://news.knopka.ca/rss', 7);
      getNews(news2, 'https://moxie.foxnews.com/google-publisher/latest.xml', 7);
      content.style.display = 'block';
    }
  </script>
  <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
  <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</body>

</html>
