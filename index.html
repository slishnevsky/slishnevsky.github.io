<!DOCTYPE html>
<html>

<head>
  <title>Homepage</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/x-icon" href="assets/favicon.png" />
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
  <script src="js/index.js"></script>
  <script src="js/weather.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/bookmarks.js"></script>
  <script src="js/news.js"></script>
</head>

<body>
  <nav class="navbar navbar-inverse navbar-fixed-top">
    <div class="container">
      <div class="navbar-header">
        <div id="datetime" class="navbar-brand"></div>
      </div>
      <div class="collapse navbar-collapse" id="navbarNav">
        <form class="navbar-form navbar-right" onsubmit="return false">
          <div class="form-group">
            <input type="text" id="search" name="search" class="form-control" placeholder="Search" autofocus>
          </div>
          <button type="button" class="btn btn-success" onclick="searchGoogle(this.form.search.value)">Search</button>
          <button type="button" class="btn btn-primary"
            onclick="tokenClient.requestAccessToken({ prompt: 'consent' })">Sign in</button>
        </form>
      </div>
    </div>
  </nav>
  <div class="container">
    <div class="row">
      <div class="col-sm-4">
        <div id="weather" class="panel panel-default">
          <div class="panel-heading">
            <a href="https://weather.gc.ca/en/location/index.html?coords=43.655,-79.383" target="_blank">Погода</a>
          </div>
        </div>
        <div id="calendar" class="panel panel-default">
          <div class="panel-heading">
            <a href="https://calendar.google.com/calendar/u/0/r" target="_blank">Календарь</a>
          </div>
        </div>
        <div id="events" class="panel panel-default">
          <div class="panel-heading">
            <a href="https://calendar.google.com/calendar/u/0/r" target="_blank">Запланированные события</a>
          </div>
        </div>
      </div>
      <div class="col-sm-4">
        <div id="bookmarks1" class="panel panel-default">
          <div class="panel-heading">
            <a href="https://www.circulars.ca/" target="_blank">Флаерсы</a>
          </div>
        </div>
        <div id="bookmarks2" class="panel panel-default">
          <div class="panel-heading">
            <a href="https://flyers.smartcanucks.ca/" target="_blank">Магазины</a>
          </div>
        </div>
        <div id="bookmarks3" class="panel panel-default">
          <div class="panel-heading">Сервисы</div>
        </div>
      </div>
      <div class="col-sm-4">
        <div id="news1" class="panel panel-default">
          <div class="panel-heading">
            <a href="https://news.knopka.ca/" target="_blank">Канадские новости</a>
          </div>
        </div>
        <div id="news2" class="panel panel-default">
          <div class="panel-heading">
            <a href="https://www.foxnews.com/" target="_blank">Мировые новости</a>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script type="text/javascript">
    // Google API configuration
    const CLIENT_ID = '84522859201-u0bemvmn44b552j4j2eq7j5smdn32et8.apps.googleusercontent.com';
    const API_KEY = 'AIzaSyBDfHg7DWRW8ruNA7E90swUJpEJ_IiLqNo';
    const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest';
    const SCOPES = 'https://www.googleapis.com/auth/calendar.readonly';

    let tokenClient; // Declare tokenClient in the global scope
    let gapiInited = false; // Track if gapi is initialized
    let gisInited = false; // Track if GIS is initialized
    let authStarted = false; // Track if authorization has started

    // Load the API client and auth2 library
    function gapiLoaded() {
      gapi.load('client', initializeGapiClient);
    }

    // Initialize the API client library
    async function initializeGapiClient() {
      await gapi.client.init({
        apiKey: API_KEY,
        discoveryDocs: [DISCOVERY_DOC],
      });
      gapiInited = true; // Mark gapi as initialized
      maybeAuthorize();
    }

    // Initialize the Google Identity Services client
    function gisLoaded() {
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: async (resp) => {
          if (resp.error) {
            console.warn('Silent auth failed, retrying with consent...');
            return;
          }
          resp.created_at = Math.floor(Date.now() / 1000); // Add created_at timestamp to the token response
          localStorage.setItem('gapi_token', JSON.stringify(resp)); // Save token to localStorage
          gapi.client.setToken(resp); // Set the token for gapi client
          createAllContent();
        },
      });
      gisInited = true; // Mark GIS as initialized
      maybeAuthorize();
    }

    // Attempt to authorize the user if both libraries are initialized
    function maybeAuthorize() {
      if (!(gapiInited && gisInited) || authStarted) return;
      authStarted = true; // Ensure authorization is only attempted once
      authorize();
    }

    // Authorize the user
    function authorize() {
      const saved = JSON.parse(localStorage.getItem('gapi_token')); // Get the saved token from localStorage
      if (saved && !isTokenExpired(saved)) { // If token exists and is not expired
        gapi.client.setToken(saved); // Set the token for gapi client
        createAllContent();
      } else {
        localStorage.removeItem('gapi_token'); // Remove expired token from localStorage
        tokenClient.requestAccessToken({ prompt: '' }); // Request a new token without prompting the user (silent auth)
      }
    }

    // Check if the token is expired
    function isTokenExpired(token) {
      const now = Date.now() / 1000; // Get the current time in seconds
      return !token.expires_in || (token.created_at + token.expires_in) <= now; // Check if the token is expired
    }

    function createAllContent() {
      // Delete all content from the panels except the headings
      const panels = document.querySelectorAll('.panel');
      panels.forEach(panel => { while (panel.children.length > 1) panel.lastElementChild.remove(); });
      // Create content for each panel
      getDateTime(document.getElementById('datetime'));
      getWeather(document.getElementById('weather'));
      getCalendar(document.getElementById('calendar'), document.getElementById('events'));
      getBookmarks(document.getElementById('bookmarks1'), 'Флаерсы');
      getBookmarks(document.getElementById('bookmarks2'), 'Магазины');
      getBookmarks(document.getElementById('bookmarks3'), 'Сервисы');
      getNews(document.getElementById('news1'), 'https://news.knopka.ca/rss', 7); // Canadian news
      getNews(document.getElementById('news2'), 'https://moxie.foxnews.com/google-publisher/world.xml', 7); // Fox News World
    }

  </script>
  <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
  <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</body>

</html>
