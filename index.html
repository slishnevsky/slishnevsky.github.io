<!DOCTYPE html>
<html>

<head>
  <title>Bootstrap Template</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
  <!-- <script src="weather.js"></script> -->
  <script src="calendar.js"></script>
  <!-- <script src="calendar2.js"></script> -->
  <script src="bookmarks.js"></script>
  <script src="news.js"></script>
  <script src="datetime.js"></script>
  <style>
    body {
      padding-top: 70px;
      padding-bottom: 30px;
      background: #556677 url("background.jpg") no-repeat fixed center
    }
    .navbar {
      margin-bottom: 20px;
    }
    .navbar-brand {
      color: salmon !important;
    }
    .panel-heading {
      font-weight: bold;
    }
  </style>
</head>

<body onload="loadComponents()">
  <nav class="navbar navbar-inverse navbar-fixed-top">
    <div class="container">
      <div class="navbar-header">
        <button type="button" class="navbar-toggle" data-toggle="collapse" data-target="#navbarNav">
          <span class="sr-only">Toggle navigation</span>
          <span class="icon-bar"></span>
          <span class="icon-bar"></span>
          <span class="icon-bar"></span>
        </button>
        <a id="datetime" class="navbar-brand" href="#"></a>
      </div>
      <div class="collapse navbar-collapse" id="navbarNav">
        <!-- <ul class="nav navbar-nav">
          <li class="active"><a href="#">Home</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Contact</a></li>
        </ul> -->
        <form class="navbar-form navbar-right">
          <div class="form-group">
            <input type="text" class="form-control" placeholder="Search">
          </div>
          <button type="submit" class="btn btn-success">Search</button>
        </form>
      </div>
    </div>
  </nav>
  <div class="container">
    <div class="row">
      <div class="col-md-4">
        <div class="panel panel-default">
          <div class="panel-heading">Погода</div>
          <div id="weather" class="panel-body">Weather content</div>
        </div>
        <div id="calendar" class="panel panel-default">
          <div class="panel-heading">Календарь</div>
          <!-- Calendar table inserted here -->
        </div>
      </div>
      <div class="col-md-4">
        <div id="bookmarks1" class="panel panel-default">
          <div class="panel-heading">Магазины</div>
          <!-- Bookmarks list inserted here -->
        </div>
        <div id="bookmarks2" class="panel panel-default">
          <div class="panel-heading">Сервисы</div>
          <!-- Bookmarks list inserted here -->
        </div>
      </div>
      <div class="col-md-4">
        <div id="news" class="panel panel-default">
          <div class="panel-heading">Последние новости</div>
          <!-- News list inserted here -->
        </div>
      </div>
    </div>
  </div>
  <script type="text/javascript">
    function loadComponents() {
      var datetime1 = document.getElementById('datetime');
      var weather1 = document.getElementById('weather');
      var calendar1 = document.getElementById('calendar');
      var bookmarks1 = document.getElementById('bookmarks1');
      var bookmarks2 = document.getElementById('bookmarks2');
      var news1 = document.getElementById('news');

      getDateTime(datetime1);
      // getWeather(weather1);
      createCalendar(calendar1, 6, 2023);
      // getEvents(calendar1);
      getBookmarks(bookmarks1, 'Магазины');
      getBookmarks(bookmarks2, 'Сервисы');
      getNews(news1, 'https://corsproxy.io/?https://news.knopka.ca/rss');
    }
  </script>
</body>

</html>
