<!DOCTYPE html>
<html>
<head>
  <title>RSS Reader</title>
</head>
<body>
  <div id="rss-feed"></div>

  <script>
    // URL of the RSS feed
    const rssUrl = 'https://cors-anywhere.herokuapp.com/https://news.knopka.ca/rss';

    // Function to fetch and parse the RSS feed
    const fetchRssFeed = async () => {
      try {
        const response = await fetch(rssUrl);
        const xmlText = await response.text();
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(xmlText, 'text/xml');

        // Get the <item> elements from the RSS feed
        const items = xmlDoc.getElementsByTagName('item');

        // Loop through each item and create HTML elements to display the content
        for (let i = 0; i < items.length; i++) {
          const title = items[i].getElementsByTagName('title')[0].textContent;
          const link = items[i].getElementsByTagName('link')[0].textContent;
          const description = items[i].getElementsByTagName('description')[0].textContent;
          const enclosure = items[i].getElementsByTagName('enclosure')[0].attributes['url'].textContent;

          // Create HTML elements for each item
          const itemContainer = document.createElement('div');
          const itemTitle = document.createElement('h3');
          const itemLink = document.createElement('a');
          const itemDescription = document.createElement('p');
          const itemEnclosure = document.createElement('img');

          // Set the content for each element
          itemTitle.textContent = title;
          itemLink.textContent = title;
          itemLink.href = link;
          itemLink.target = '_blank';
          itemDescription.textContent = description;
          itemEnclosure.src = enclosure;

          // Append the elements to the container div
          itemContainer.appendChild(itemTitle);
          itemContainer.appendChild(itemLink);
          itemContainer.appendChild(itemDescription);
          itemContainer.appendChild(itemEnclosure);

          // Append the container div to the RSS feed div
          document.getElementById('rss-feed').appendChild(itemContainer);
        }
      } catch (error) {
        console.error('Error fetching RSS feed:', error);
      }
    };

    // Call the function to fetch and display the RSS feed
    fetchRssFeed();
  </script>
</body>
</html>
